  :root, [data-theme="dark"] {
    --c-bg:          #0D1117;

    --c-border:      #30363D;
    --c-text:        #E6EDF3;
    --c-muted:       #8B949E;
    --c-dim:         #768390;
    --c-green:       #238636;
    --c-red:         #F85149;

    color-scheme: dark;
  }
  [data-theme="light"] {
    --c-bg:          #F6F8FA;

    display: flex; align-items: center; gap: 6px;
